name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Latest version for performance

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Upgraded from v2
        with:
          node-version: "20.x" # Node 14 is deprecated; 20 is the 2026 LTS standard

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Test Report
        uses: actions/upload-artifact@v4 # FIX: v2 is deprecated. v4 is required.
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
